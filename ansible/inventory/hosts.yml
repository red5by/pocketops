---
# PocketOps - Ansible Inventory
# EC2インスタンスは動的に追加する想定（AWS Dynamic Inventoryと組み合わせ可）

all:
  vars:
    ansible_user: ec2-user
    ansible_ssh_private_key_file: "~/.ssh/pocketops-key.pem"
    ansible_python_interpreter: /usr/bin/python3

  children:
    pocketops_dev:
      hosts:
        dev01:
          ansible_host: "{{ lookup('env', 'DEV_EC2_HOST') }}"
      vars:
        env: dev
        app_port: 8080

    pocketops_staging:
      hosts:
        staging01:
          ansible_host: "{{ lookup('env', 'STAGING_EC2_HOST') }}"
      vars:
        env: staging
        app_port: 8080
